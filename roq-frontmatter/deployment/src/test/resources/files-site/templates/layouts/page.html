---
layout: default
link: /pages/:slug
---
<article class="page">
  {#insert /}
  <span class="is-index">{page.source.isIndex}</span>
  <span class="has-files">{page.source.hasFiles}</span>
  {#if page.source.hasFiles}<span class="files-count">{page.files.size}</span>{/if}
  {#if page.image != null}<span class="page-image-url">{page.image.path}</span>{/if}
</article>
