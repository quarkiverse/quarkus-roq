quarkus.log.category."io.quarkiverse.qute.web.image".level=DEBUG
quarkus.log.category."io.quarkiverse.roq".level=DEBUG

# Hero: responsive widths, no crop
quarkus.qute.image.presets.hero.formats=webp,jpg
quarkus.qute.image.presets.hero.fallback-format=jpg
quarkus.qute.image.presets.hero.widths=350,600,1000
quarkus.qute.image.presets.hero.quality=80

# Post card: listing thumbnails
quarkus.qute.image.presets.post-card.formats=webp,jpg
quarkus.qute.image.presets.post-card.fallback-format=jpg
quarkus.qute.image.presets.post-card.widths=160,350,600,1000
quarkus.qute.image.presets.post-card.quality=80

# Avatar: small square crop
quarkus.qute.image.presets.avatar.formats=webp,jpg
quarkus.qute.image.presets.avatar.fallback-format=jpg
quarkus.qute.image.presets.avatar.widths=48,72,96
quarkus.qute.image.presets.avatar.crop.ratio=1:1
quarkus.qute.image.presets.avatar.crop.keep=center
quarkus.qute.image.presets.avatar.pixel-ratio.base-width=48
quarkus.qute.image.presets.avatar.pixel-ratio.fallback-width=48
quarkus.qute.image.presets.avatar.pixel-ratio.ratios=1,1.5,2

# Gallery image: 4:3 crop
quarkus.qute.image.presets.gallery-image.formats=webp,jpg
quarkus.qute.image.presets.gallery-image.fallback-format=jpg
quarkus.qute.image.presets.gallery-image.widths=400,800
quarkus.qute.image.presets.gallery-image.crop.ratio=4:3
quarkus.qute.image.presets.gallery-image.crop.keep=center
quarkus.qute.image.presets.gallery-image.quality=80

# Direct URL: raw URL output for lightbox links
quarkus.qute.image.presets.direct.formats=webp,jpg
quarkus.qute.image.presets.direct.fallback-format=jpg
quarkus.qute.image.presets.direct.widths=800
quarkus.qute.image.presets.direct.direct-url=true
