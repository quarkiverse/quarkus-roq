name: Build PR Preview

on:
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.txt'
      - '.all-contributorsrc'
permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Prepare git
        run: git config --global core.autocrlf false
        if: startsWith(matrix.os, 'windows')

      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'

      - name: Test Roq
        run: mvn -B clean install --file pom.xml -Dno-format

  build-website:
    name: Build Website
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: 'maven'

      - name: Build Roq
        run: mvn -B clean install --file pom.xml -DskipTests -Dno-format

      - name: Store PR id
        run: |
          echo ${{ github.event.number }} > ./docs/target/generated-docs/pr-id.txt

      - name: Publishing docs
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: ./docs/target/generated-docs
          retention-days: 3

      - name: Build blog
        uses: ./
        with:
          setup-java: 'false'
          github-pages: 'false'
          site-directory: 'blog'
          site-future: 'true'
          maven-executable: 'mvn'

      - name: Publishing blog
        uses: actions/upload-artifact@v7
        with:
          name: blog
          path: ./blog/target/roq
          retention-days: 3
