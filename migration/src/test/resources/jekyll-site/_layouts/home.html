---
layout: default
---
<div class="home">
  <h1>{{ page.title }}</h1>
  {{ content }}
  <h2>Posts</h2>
  <ul class="post-list">
    {% for post in site.posts %}
    <li>
      <span class="post-date">{{ post.date | date: "%b %-d, %Y" }}</span>
      <a class="post-link" href="{{ post.url }}">{{ post.title }}</a>
    </li>
    {% endfor %}
  </ul>
</div>
