name: {profile.name}
handle: "{profile.handle}"
title: {profile.title}
image: ada.png
bio: |
  Ada Lovelace was a 19th-century mathematician known for her
  visionary work on Charles Babbage's Analytical Engine.
social:
{#for s in profile.social}
  - name: {s.name}
    url: {s.url}
    icon: {s.icon}
{/for}
links:
{#for link in profile.links}
  - name: {link.name}
    url: {link.url}
    {#if link.description}description: {link.description}
    {/if}icon: {link.icon}
{/for}
